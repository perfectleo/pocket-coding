name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  server:
    name: Server (typecheck + unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install deps
        run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test

  app:
    name: App (analyze + unit/widget tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Pub get
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Tests
        run: flutter test

  # Integration / device tests are NOT run here — they need a device (or
  # Firebase Test Lab / a self-hosted runner) and a live server. See
  # docs/testing-plan.md for how to run them locally or in a dedicated job.
