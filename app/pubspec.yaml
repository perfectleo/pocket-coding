publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  web_socket_channel: ^3.0.1
  xterm: ^4.0.0
  go_router: ^14.6.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.2.2
  path_provider: ^2.1.5
  flutter_highlight: ^0.7.0
  shared_preferences: ^2.3.3
  flutter_markdown: ^0.7.4+3
  google_fonts: ^6.2.1
  webview_flutter: ^4.14.1
  speech_to_text: ^7.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
